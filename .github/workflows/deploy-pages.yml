name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # GitHub Pages 部署會自動建立一個叫 github-pages 的 Environment；如果 secrets
    # 是加在這個 Environment 底下（而不是純粹的 repo-level secrets），沒有宣告
    # environment 的 job 看不到——這裡宣告一次，兩種來源都吃得到，不用猜使用者
    # 實際加在哪裡（實測發現 repo-level secrets 沒有被建置吃到，懷疑就是這個原因）。
    environment:
      name: github-pages
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
          # Firebase 前端設定值不進 git（見 web/.env.example），CI 建置時要從
          # repo 的 Actions secrets 帶進來，否則正式站會用空值初始化 Firebase，
          # 一呼叫任何 Auth/Firestore/Storage API 就整個崩潰（實際發生過一次）。
          # 對應的 7 個 secret 要先在 GitHub repo Settings → Secrets and
          # variables → Actions 手動新增，值跟本機 web/.env.local 一致。
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
